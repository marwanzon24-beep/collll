<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub PRO++</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  background: linear-gradient(270deg,#ffecb3,#90caf9,#ffe082);
  background-size:400% 400%;
  animation:bg 8s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{max-width:420px;margin:auto;padding:15px}

.card{
  background:rgba(255,255,255,0.95);
  padding:15px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  animation:pop .3s ease;
}

@keyframes pop{
  from{transform:scale(0.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  background:linear-gradient(135deg,#222,#555);
  color:#fff;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

button:hover{transform:scale(1.05)}
button:active{transform:scale(0.95)}

.user{
  background:#f5f5f5;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}
.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:8px;
  background:#ffd54f;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="login">
    <h3>🎮 تسجيل دخول</h3>
    <input id="name" placeholder="الاسم">
    <input id="pass" type="password" placeholder="الباسورد">
    <button onclick="login()">دخول</button>
  </div>

  <!-- PANEL -->
  <div class="card" id="panel" style="display:none">

    <h3 id="welcome"></h3>

    <button onclick="gainXP()">+10 XP ⚡</button>

    <div id="me"></div>

    <!-- ADMIN -->
    <div id="admin" style="display:none">
      <h4>👑 Admin Panel</h4>
      <div id="users"></div>
    </div>

  </div>

</div>

<script>

let users = {
  "Aya": {pass:"6678",xp:0},
  "Habiba": {pass:"3342",xp:0},
  "Yassin": {pass:"2217",xp:0},
  "Marwan": {pass:"2234",xp:0},
  "admin": {pass:"admin",xp:999}
};

let current=null;

/* Load */
function load(){
  let d=localStorage.getItem("hub");
  if(d) users=JSON.parse(d);
}
load();

/* Save */
function save(){
  localStorage.setItem("hub",JSON.stringify(users));
}

/* Login */
function login(){

  let n=document.getElementById("name").value.trim();
  let p=document.getElementById("pass").value;

  let found=null;

  for(let k in users){
    if(k.toLowerCase()===n.toLowerCase()){
      found=k;
      break;
    }
  }

  if(found && users[found].pass===p){

    current=found;

    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";

    document.getElementById("welcome").innerHTML=
      "أهلاً "+found+" "+getLevelBadge();

    if(found==="admin"){
      document.getElementById("admin").style.display="block";
      render();
    }

    show();
  }
  else{
    alert("❌ بيانات غلط");
  }
}

/* Level System */
function level(xp){
  return Math.floor(xp/50);
}

function getLevelBadge(){
  return " <span class='badge'>LVL "+level(users[current]?.xp||0)+"</span>";
}

/* Show */
function show(){
  let u=users[current];
  document.getElementById("me").innerHTML=`
    <div class="user">
      ⭐ XP: ${u.xp}<br>
      🏆 Level: ${level(u.xp)}
    </div>
  `;
}

/* Gain XP */
function gainXP(){
  users[current].xp += 10;
  save();
  show();
}

/* Admin */
function render(){
  let html="";
  for(let k in users){
    html+=`
      <div class="user">
        ${k}<br>
        XP:
        <input value="${users[k].xp}"
        onchange="users['${k}'].xp=parseInt(this.value);save();render()">
      </div>
    `;
  }
  document.getElementById("users").innerHTML=html;
}

</script>

</body>
</html>
